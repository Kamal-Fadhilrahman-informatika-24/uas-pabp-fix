<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dashboard – SpinDecide</title>

  <meta name="theme-color" content="#0f0f1a">
  <meta name="description" content="Putar roda, dapatkan keputusan!">
  <link rel="manifest" href="manifest.json">

  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <link rel="stylesheet" href="style.css">
  <link rel="stylesheet" href="global-features.css">
  <script src="theme-controller.js"></script>
  <script src="audio-controller.js"></script>
</head>
<body class="dashboard-page">

  <nav class="navbar">
    <div class="nav-logo">
      <span>🎯</span>
      <span class="nav-appname">SpinDecide</span>
    </div>

    <div class="nav-links">
      <a href="dashboard.html"   class="nav-link active">🎰 Spin</a>
      <a href="truth-dare.html"  class="nav-link">🎭 Truth or Dare</a>
      <a href="double-spin.html" class="nav-link">⚡ Double Spin</a>
      <a href="multiplayer.html" class="nav-link">🌐 Main Bareng</a>
      <a href="history.html"     class="nav-link">📋 Riwayat</a>
    </div>

    <div class="nav-user">
      <div class="avatar" id="userAvatar">?</div>
      <span class="username" id="userName">Loading…</span>
      <button class="btn-logout" onclick="logoutUser()">Keluar</button>
    </div>
  </nav>

  <div class="dashboard-layout">

    <aside class="sidebar">

      <div class="panel">
        <div class="panel-title">✏️ Pengaturan Putaran</div>

        <div style="display: flex; gap: 10px; margin-bottom: 15px;">
          <button id="btnModeNormal" class="quick-btn" style="flex:1; border-color: var(--accent-4); background: rgba(77, 150, 255, 0.1);" onclick="setMode('normal')">🟢 Mode Normal</button>
          <button id="btnModeBobot" class="quick-btn" style="flex:1;" onclick="setMode('bobot')">⚖️ Mode Bobot</button>
        </div>

        <div class="input-row" style="display: flex; gap: 8px; flex-wrap: wrap;">
          <input
            type="text"
            id="optionInput"
            placeholder="Ketik pilihan..."
            maxlength="40"
            style="flex: 2; min-width: 120px;"
            onkeydown="handleInputKey(event)"
          >
          <input
            type="number"
            id="weightInput"
            placeholder="Bobot"
            min="1"
            max="100"
            value="1"
            style="display: none; flex: 1; min-width: 70px; padding: 12px; border-radius: var(--radius-sm); border: 1px solid var(--border); background: var(--bg-input); color: var(--text-primary); font-family: var(--font-main);"
            onkeydown="handleInputKey(event)"
          >
          <button class="btn-add" style="flex: 1; min-width: 100%;" onclick="addOption()">+ Tambah</button>
        </div>

        <div class="options-header" style="margin-top: 15px;">
          <span>Daftar Pilihan</span>
          <span><strong id="optionCount">0</strong>/12</span>
        </div>

        <div class="options-list" id="optionsList">
          <div class="empty-options">
            <span class="empty-icon">🎯</span>
            <p>Belum ada pilihan.<br>Tambahkan di atas!</p>
          </div>
        </div>
      </div>

      <div class="panel">
        <div class="panel-title">⚡ Contoh Cepat</div>
        <div style="display: flex; flex-wrap: wrap; gap: 8px;">
          <button class="quick-btn" onclick="loadPreset('makan')">🍜 Mau makan apa?</button>
          <button class="quick-btn" onclick="loadPreset('weekend')">🎮 Weekend ngapain?</button>
          <button class="quick-btn" onclick="loadPreset('belajar')">📚 Belajar apa dulu?</button>
        </div>
      </div>

    </aside>

    <main class="wheel-area">
      <div class="wheel-wrapper">
        <div id="wheelContainer">
          <canvas id="wheelCanvas" width="420" height="420"></canvas>
        </div>
        <div class="wheel-pointer"></div>
      </div>

      <button class="btn-spin" id="spinBtn" onclick="spinWheel()">
        🎰 PUTAR!
      </button>
    </main>

  </div>

  <div class="result-overlay" id="resultOverlay">
    <div class="result-card">
      <span class="result-emoji">🏆</span>
      <div class="result-label">Hasilnya adalah…</div>
      <div id="resultText">–</div>
      
      <div class="result-actions" style="display: flex; flex-wrap: wrap; gap: 10px; justify-content: center; margin-top: 20px;">
        <button class="btn-close-result" onclick="closeResult()">Tutup</button>
        <button class="btn-remove-winner" onclick="removeWinnerAndClose()">🗑️ Hapus Pilihan</button>
        <button class="btn-spin-again" onclick="closeResult(); spinWheel();">Putar Lagi!</button>
      </div>
    </div>
  </div>

  <div class="toast" id="toast"></div>

  <script src="supabase.js"></script>
  <script src="auth.js"></script>
  <script src="spin.js"></script>

  <script>
    (async function init() {
      const session = await requireAuth();
      const user    = session.user;

      const name = user.user_metadata?.name || user.email.split('@')[0];
      document.getElementById('userName').textContent = name;
      document.getElementById('userAvatar').textContent = name.charAt(0).toUpperCase();

      resizeCanvas();
      window.addEventListener('resize', resizeCanvas);
    })();

    const PRESETS = {
      makan:   ['Nasi Goreng', 'Mie Ayam', 'Bakso', 'Pecel Lele', 'Soto', 'Warteg'],
      weekend: ['Main game', 'Nonton film', 'Tidur', 'Jalan-jalan', 'Baca buku', 'Olahraga'],
      belajar: ['Algoritma', 'Database', 'Web Dev', 'Mobile', 'OS', 'Jaringan']
    };

    function loadPreset(key) {
      const preset = PRESETS[key];
      if (!preset) return;
      options = preset.map(item => ({ text: item, weight: 1 }));
      renderOptions();
      drawWheel();
      showToast(`Preset "${key}" dimuat! ✓`, 'success');
    }
  </script>

  <style>
    .quick-btn {
      background: var(--bg-card); border: 1px solid var(--border);
      color: var(--text-secondary); padding: 7px 12px;
      border-radius: 8px; cursor: pointer;
      font-family: var(--font-main); font-size: 0.8rem; font-weight: 600;
      transition: all 0.2s;
    }
    .quick-btn:hover {
      color: var(--text-primary); background: var(--bg-input);
      border-color: var(--accent-4);
    }
    /* STYLING UNTUK TOMBOL HAPUS DI POP-UP */
    .btn-remove-winner {
      background: rgba(255, 107, 107, 0.1);
      border: 1px solid var(--accent-1);
      color: var(--accent-1);
      padding: 10px 20px;
      border-radius: 50px;
      font-weight: bold;
      cursor: pointer;
      transition: all 0.2s;
    }
    .btn-remove-winner:hover {
      background: rgba(255, 107, 107, 0.2);
      transform: translateY(-2px);
      box-shadow: 0 5px 15px rgba(255, 107, 107, 0.2);
    }
  </style>

</body>
</html>
