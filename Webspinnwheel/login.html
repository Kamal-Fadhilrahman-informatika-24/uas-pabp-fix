<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login – SpinDecide</title>

  <!-- PWA Meta -->
  <meta name="theme-color" content="#0f0f1a">
  <link rel="manifest" href="manifest.json">

  <!-- Supabase CDN (versi stabil, gratis) -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

  <link rel="stylesheet" href="style.css">
  <link rel="stylesheet" href="global-features.css">
  <!-- ── Global Features: Dark Mode + Mute Control ── -->
  <script src="theme-controller.js"></script>
  <script src="audio-controller.js"></script>
</head>
<body class="auth-page">

  <div class="auth-card">
    <div class="auth-logo">
      <span class="logo-icon">🎯</span>
      <h1>SpinDecide</h1>
      <p>Putar roda, dapatkan keputusan!</p>
    </div>

    <form class="auth-form" id="loginForm" onsubmit="handleLogin(event)">

      <div class="form-group">
        <label for="email">Email</label>
        <input
          type="email" id="email" name="email"
          placeholder="nama@email.com"
          required autocomplete="email"
        >
      </div>

      <div class="form-group">
        <label for="password">Password</label>
        <input
          type="password" id="password" name="password"
          placeholder="Masukkan password"
          required autocomplete="current-password"
        >
      </div>

      <div class="auth-error" id="errorMsg"></div>

      <button type="submit" class="btn-submit" id="submitBtn">
        Masuk
      </button>

    </form>

    <div class="auth-footer">
      Belum punya akun?
      <a href="register.html">Daftar sekarang</a>
    </div>
  </div>

  <!-- Script -->
  <script src="supabase.js"></script>
  <script src="auth.js"></script>
  <script>
    // Redirect jika sudah login
    requireGuest();

    async function handleLogin(e) {
      e.preventDefault();

      const email    = document.getElementById('email').value.trim();
      const password = document.getElementById('password').value;
      const btn      = document.getElementById('submitBtn');
      const errEl    = document.getElementById('errorMsg');

      // Reset error
      errEl.textContent = '';
      errEl.classList.remove('visible');

      // Loading state
      btn.disabled    = true;
      btn.textContent = 'Memproses…';

      try {
        await loginUser(email, password);
        window.location.href = 'dashboard.html';
      } catch (err) {
        errEl.textContent = 'Email atau password salah. Coba lagi.';
        errEl.classList.add('visible');
        btn.disabled    = false;
        btn.textContent = 'Masuk';
      }
    }
  </script>
</body>
</html>
