name: spinwheel_app
description: SpinWheel App - Flutter Mobile Client for SpinWheel Fun
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.3.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # Supabase
  supabase_flutter: ^2.5.6

  # Notifikasi Lokal
  flutter_local_notifications: ^17.2.2

  # State management
  provider: ^6.1.2

  # Audio - upgrade ke v6 untuk kompatibilitas Java 21 / AGP 8.9
  audioplayers: ^6.1.0

  # SharedPreferences
  shared_preferences: ^2.3.0

  # Format tanggal
  intl: ^0.19.0

  # Icons
  cupertino_icons: ^1.0.8

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/sounds/
