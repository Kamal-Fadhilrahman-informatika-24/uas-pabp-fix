<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dashboard – SpinDecide</title>

  <meta name="theme-color" content="#0f0f1a">
  <meta name="description" content="Putar roda, dapatkan keputusan!">
  <link rel="manifest" href="manifest.json">

  <!-- iOS PWA -->
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="SpinDecide">

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <link rel="stylesheet" href="style.css">
  <link rel="stylesheet" href="global-features.css">
  <!-- ── Global Features: Dark Mode + Mute Control ── -->
  <script src="theme-controller.js"></script>
  <script src="audio-controller.js"></script>
</head>
<body class="dashboard-page">

  <!-- ── Navbar ─────────────────────────────────────────────── -->
  <nav class="navbar">
    <div class="nav-logo">
      <span>🎯</span>
      <span class="nav-appname">SpinDecide</span>
    </div>

    <div class="nav-links">
      <a href="dashboard.html"   class="nav-link active">🎰 Spin</a>
      <a href="truth-dare.html"  class="nav-link">🎭 Truth or Dare</a>
      <a href="double-spin.html" class="nav-link">⚡ Double Spin</a>
      <a href="multiplayer.html" class="nav-link">🌐 Main Bareng</a>
      <a href="history.html"     class="nav-link">📋 Riwayat</a>
    </div>

    <div class="nav-user">
      <div class="avatar" id="userAvatar">?</div>
      <span class="username" id="userName">Loading…</span>
      <button class="btn-logout" onclick="logoutUser()">Keluar</button>
    </div>
  </nav>

  <!-- ── Layout Utama ──────────────────────────────────────── -->
  <!--
    Desktop: grid 2 kolom (sidebar | wheel)
    Mobile:  grid 1 kolom (sidebar atas, wheel bawah)
    Diatur di style.css dengan media query
  -->
  <div class="dashboard-layout">

    <!-- ─ Sidebar Kiri: Form input pilihan ─────────────────── -->
    <aside class="sidebar">

      <div class="panel">
        <div class="panel-title">✏️ Tambah Pilihan</div>

        <div class="input-row">
          <input
            type="text"
            id="optionInput"
            placeholder="Contoh: Nasi Goreng"
            maxlength="40"
            onkeydown="handleInputKey(event)"
          >
          <button class="btn-add" onclick="addOption()">+ Tambah</button>
        </div>

        <div class="options-header">
          <span>Daftar Pilihan</span>
          <span><strong id="optionCount">0</strong>/12</span>
        </div>

        <div class="options-list" id="optionsList">
          <div class="empty-options">
            <span class="empty-icon">🎯</span>
            <p>Belum ada pilihan.<br>Tambahkan di atas!</p>
          </div>
        </div>
      </div>

      <!-- Contoh pilihan cepat -->
      <div class="panel">
        <div class="panel-title">⚡ Contoh Cepat</div>
        <div style="display: flex; flex-wrap: wrap; gap: 8px;">
          <button class="quick-btn" onclick="loadPreset('makan')">🍜 Mau makan apa?</button>
          <button class="quick-btn" onclick="loadPreset('weekend')">🎮 Weekend ngapain?</button>
          <button class="quick-btn" onclick="loadPreset('belajar')">📚 Belajar apa dulu?</button>
        </div>
      </div>

    </aside>

    <!-- ─ Area Kanan: Roda & tombol spin ────────────────────── -->
    <main class="wheel-area">

      <div class="wheel-wrapper">
        <div id="wheelContainer">
          <canvas id="wheelCanvas" width="420" height="420"></canvas>
        </div>
        <!-- Penunjuk (pointer) di kanan roda -->
        <div class="wheel-pointer"></div>
      </div>

      <button class="btn-spin" id="spinBtn" onclick="spinWheel()">
        🎰 PUTAR!
      </button>

    </main>

  </div><!-- end dashboard-layout -->

  <!-- ── Result Overlay ─────────────────────────────────────── -->
  <div class="result-overlay" id="resultOverlay">
    <div class="result-card">
      <span class="result-emoji">🏆</span>
      <div class="result-label">Hasilnya adalah…</div>
      <div id="resultText">–</div>
      <div class="result-actions">
        <button class="btn-close-result" onclick="closeResult()">Tutup</button>
        <button class="btn-spin-again" onclick="closeResult(); spinWheel();">Putar Lagi!</button>
      </div>
    </div>
  </div>

  <!-- ── Toast ──────────────────────────────────────────────── -->
  <div class="toast" id="toast"></div>

  <!-- ── Scripts ────────────────────────────────────────────── -->
  <script src="supabase.js"></script>
  <script src="auth.js"></script>
  <script src="spin.js"></script>

  <script>
    // ── Inisialisasi halaman ────────────────────────────────
    (async function init() {
      const session = await requireAuth();
      const user    = session.user;

      // Tampilkan nama & avatar
      const name = user.user_metadata?.name || user.email.split('@')[0];
      document.getElementById('userName').textContent = name;
      document.getElementById('userAvatar').textContent = name.charAt(0).toUpperCase();

      // Gambar roda awal
      resizeCanvas();
      window.addEventListener('resize', resizeCanvas);
    })();

    // ── Preset pilihan cepat ────────────────────────────────
    const PRESETS = {
      makan:   ['Nasi Goreng', 'Mie Ayam', 'Bakso', 'Pecel Lele', 'Soto', 'Warteg'],
      weekend: ['Main game', 'Nonton film', 'Tidur', 'Jalan-jalan', 'Baca buku', 'Olahraga'],
      belajar: ['Algoritma', 'Database', 'Web Dev', 'Mobile', 'OS', 'Jaringan']
    };

    function loadPreset(key) {
      const preset = PRESETS[key];
      if (!preset) return;
      options = [...preset];
      renderOptions();
      drawWheel();
      showToast(`Preset "${key}" dimuat! ✓`, 'success');
    }
  </script>

  <!-- ── Style tambahan untuk quick-btn ─────────────────────── -->
  <style>
    .quick-btn {
      background: var(--bg-card); border: 1px solid var(--border);
      color: var(--text-secondary); padding: 7px 12px;
      border-radius: 8px; cursor: pointer;
      font-family: var(--font-main); font-size: 0.8rem; font-weight: 600;
      transition: all 0.2s;
    }
    .quick-btn:hover {
      color: var(--text-primary); background: var(--bg-input);
      border-color: var(--accent-4);
    }
  </style>

  <!-- ── Service Worker (PWA) ───────────────────────────────── -->
  <script>
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('sw.js')
          .then(() => console.log('SW registered'))
          .catch(err => console.log('SW failed:', err));
      });
    }
  </script>

</body>
</html>
